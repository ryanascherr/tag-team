<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./scss/main.css">
    <title>Tag Team Database</title>
</head>
<body>
    <div class="filters">
        <div class="filters__filter">
            <h2 class="filters__title">Fighters</h2>
            <ul class="filters__list">
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_bodvar" checked type="checkbox" id="bodvar" name="checkbox" value="1">
                    <label class="filters__label" for="bodvar">Bodvar</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_ching-shih" checked type="checkbox" id="ching-shih" name="checkbox" value="1">
                    <label class="filters__label" for="ching-shih">Ching Shih</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_excalibur" checked type="checkbox" id="excalibur" name="checkbox" value="1">
                    <label class="filters__label" for="excalibur">Excalibur</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_joan" checked type="checkbox" id="joan" name="checkbox" value="1">
                    <label class="filters__label" for="joan">Joan</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_maman-brijit" checked type="checkbox" id="maman-brijit" name="checkbox" value="1">
                    <label class="filters__label" for="maman-brijit">Maman Brijit</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_mephisto" checked type="checkbox" id="mephisto" name="checkbox" value="1">
                    <label class="filters__label" for="mephisto">Mephisto</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_merlin" checked type="checkbox" id="merlin" name="checkbox" value="1">
                    <label class="filters__label" for="merlin">Merlin</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_milady" checked type="checkbox" id="milady" name="checkbox" value="1">
                    <label class="filters__label" for="milady">Milady</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_mordred" checked type="checkbox" id="mordred" name="checkbox" value="1">
                    <label class="filters__label" for="mordred">Mordred</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_morgan" checked type="checkbox" id="morgan" name="checkbox" value="1">
                    <label class="filters__label" for="morgan">Morgan</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_perceval" checked type="checkbox" id="perceval" name="checkbox" value="1">
                    <label class="filters__label" for="perceval">Perceval</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_shango" checked type="checkbox" id="shango" name="checkbox" value="1">
                    <label class="filters__label" for="shango">Shango</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_the-dragon" checked type="checkbox" id="the-dragon" name="checkbox" value="1">
                    <label class="filters__label" for="the-dragon">The Dragon</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_the-fey-folk" checked type="checkbox" id="the-fey-folk" name="checkbox" value="1">
                    <label class="filters__label" for="the-fey-folk">The Fey Folk</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_the-golem" checked type="checkbox" id="the-golem" name="checkbox" value="1">
                    <label class="filters__label" for="the-golem">The Golem</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_the-green-knight" checked type="checkbox" id="the-green-knight" name="checkbox" value="1">
                    <label class="filters__label" for="the-green-knight">The Green Knight</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_the-wild-bunch" checked type="checkbox" id="the-wild-bunch" name="checkbox" value="1">
                    <label class="filters__label" for="the-wild-bunch">The Wild Bunch</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_fighter js_wong-fei-hung" checked type="checkbox" id="wong-fei-hung" name="checkbox" value="1">
                    <label class="filters__label" for="wong-fei-hung">Wong Fei-Hung</label>
                </li>
            </ul>
            <hr>
            <div class="filters__btn-container">
                <button class="btn js_criteria js_clear-set">Clear All</button>
                <button class="btn js_criteria js_check-set">Check All</button>
            </div>
        </div>
        <div class="filters__filter">
            <h2 class="filters__title">Actions</h2>
            <ul class="filters__list">
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_starting-card" type="checkbox" id="starting-card" name="checkbox" value="1">
                    <label class="filters__label" for="starting-card">Starting Card</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_attack" type="checkbox" id="attack" name="checkbox" value="1">
                    <label class="filters__label" for="attack">Attack</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_block" type="checkbox" id="block" name="checkbox" value="1">
                    <label class="filters__label" for="block">Block</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_heal" type="checkbox" id="heal" name="checkbox" value="1">
                    <label class="filters__label" for="heal">Heal</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_direct-damage" type="checkbox" id="direct-damage" name="checkbox" value="1">
                    <label class="filters__label" for="direct-damage">Direct Damage</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_gain-power" type="checkbox" id="gain-power" name="checkbox" value="1">
                    <label class="filters__label" for="gain-power">Gain Power</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_unique-icon" type="checkbox" id="unique-icon" name="checkbox" value="1">
                    <label class="filters__label" for="unique-icon">Unique Icon</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_cancel" type="checkbox" id="cancel" name="checkbox" value="1">
                    <label class="filters__label" for="cancel">Cancel</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_conditional" type="checkbox" id="conditional" name="checkbox" value="1">
                    <label class="filters__label" for="conditional">Conditional</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_win-condition" type="checkbox" id="win-condition" name="checkbox" value="1">
                    <label class="filters__label" for="win-condition">Win Condition</label>
                </li>
                <li class="filters__list-item">
                    <input class="filters__input js_criteria js_action js_affects-starting-card" type="checkbox" id="affects-starting-card" name="checkbox" value="1">
                    <label class="filters__label" for="affects-starting-card">Affects Starting Card</label>
                </li>
            </ul>
        </div>
    </div>
    <div class="cards-container"></div>

    <div class="modal">
        <span class="modal__close-btn">X</span>
        <div class="modal__content">
            <img class="modal__img" src="" alt="">
        </div>
    </div>

    <script type="module" src="./scripts/script.js"></script>
</body>
</html>
